<th:block th:fragment="siteNavbar">
    <nav class="navbar">
        <div class="nav-container">
            <button class="nav-menu-toggle" type="button" aria-label="Mo menu" aria-expanded="false" aria-controls="primaryNav">
                <i class="fa-solid fa-bars"></i>
            </button>

            <a href="/" class="logo" aria-label="TF-Phim">
                <img th:src="@{/uploads/Images/logo_ TF-Phim.png}" src="/uploads/Images/logo_ TF-Phim.png" alt="TF-Phim logo">
            </a>

            <div class="nav-mobile-actions">
                <a class="nav-icon-btn nav-mobile-bell" th:href="@{/danh-muc/phim-moi}" href="/danh-muc/phim-moi" aria-label="Phim dang chieu">
                    <i class="fa-solid fa-bell"></i>
                </a>
                <a class="nav-icon-btn nav-mobile-favorite"
                   th:href="@{/yeu-thich}"
                   th:classappend="${favoritePage} ? ' active'"
                   aria-label="Y&#234;u th&#237;ch">
                    <i class="fa-solid fa-heart"></i>
                </a>
                <button class="nav-icon-btn nav-search-toggle" type="button" aria-label="Mo tim kiem" aria-expanded="false" aria-controls="navSearchBox">
                    <i class="fa-solid fa-magnifying-glass"></i>
                </button>
            </div>

            <ul class="nav-links" id="primaryNav">
                <li><a href="/" th:classappend="${pageTitle == 'Trang chủ'} ? ' active'">Trang ch&#7911;</a></li>
                <li><a th:href="@{/danh-muc/phim-le}" th:classappend="${categoryType == 'phim-le'} ? ' active'">Phim l&#7867;</a></li>
                <li><a th:href="@{/danh-muc/phim-bo}" th:classappend="${categoryType == 'phim-bo'} ? ' active'">Phim b&#7897;</a></li>
                <li><a th:href="@{/danh-muc/phim-moi}" th:classappend="${categoryType == 'phim-moi'} ? ' active'">Phim &#273;ang chi&#7871;u</a></li>
                <li class="nav-dropdown" th:classappend="${genreSlug != null} ? ' is-active'">
                    <button class="nav-dropdown-toggle"
                            type="button"
                            aria-expanded="false"
                            aria-haspopup="true"
                            aria-controls="genreMenu">
                        <span>Th&#7875; lo&#7841;i</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="nav-dropdown-menu nav-dropdown-menu--genre" id="genreMenu">
                        <a th:each="genre : ${genreOptions}"
                           class="nav-dropdown-link"
                           th:classappend="${genreSlug == genre['slug']} ? ' active'"
                           th:href="@{/the-loai/{slug}(slug=${genre['slug']})}"
                           th:text="${genre['name']}">H&#224;nh &#272;&#7897;ng</a>
                    </div>
                </li>
                <li class="nav-dropdown" th:classappend="${countrySlug != null} ? ' is-active'">
                    <button class="nav-dropdown-toggle"
                            type="button"
                            aria-expanded="false"
                            aria-haspopup="true"
                            aria-controls="countryMenu">
                        <span>Qu&#7889;c gia</span>
                        <i class="fa-solid fa-chevron-down"></i>
                    </button>
                    <div class="nav-dropdown-menu" id="countryMenu">
                        <a th:each="country : ${countryOptions}"
                           class="nav-dropdown-link"
                           th:classappend="${countrySlug == country['slug']} ? ' active'"
                           th:href="@{/quoc-gia/{slug}(slug=${country['slug']})}"
                           th:text="${country['name']}">H&#224;n Qu&#7889;c</a>
                    </div>
                </li>
            </ul>

            <div class="nav-actions" id="navSearchBox">
                <div class="nav-search-shell">
                    <div class="search-box nav-search-box">
                        <input type="text"
                               id="searchInput"
                               placeholder="Tìm kiếm phim, diễn viên..."
                               autocomplete="off"
                               aria-label="Tìm kiếm phim"
                               aria-expanded="false"
                               aria-controls="liveSearchPanel">
                        <button id="searchBtn" aria-label="Tìm kiếm">
                            <i class="fa-solid fa-magnifying-glass"></i>
                        </button>
                    </div>
                    <div class="live-search-panel" id="liveSearchPanel" hidden></div>
                </div>
                <button class="nav-search-close" type="button" aria-label="Đóng tìm kiếm">
                    <i class="fa-solid fa-xmark"></i>
                </button>
            </div>

            <a class="nav-favorite-shortcut"
               th:href="@{/yeu-thich}"
               th:classappend="${favoritePage} ? ' active'"
               aria-label="Y&#234;u th&#237;ch">
                <i class="fa-solid fa-heart"></i>
            </a>
        </div>
    </nav>

</th:block>
